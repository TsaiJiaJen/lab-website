<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>實驗室網站 | Laboratory Website</title>
    <!-- 引入字體，增加專業感 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        /* 基礎樣式設定 */
        :root {
            --primary-color: #2c3e50; /* 深藍色，專業感 */
            --accent-color: #3498db;  /* 亮藍色，導覽選中色 */
            --bg-color: #f9f9f9;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #333;
            line-height: 1.6;
        }

        /* 導覽列樣式 */
        header {
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        nav {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }

        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--primary-color);
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            text-decoration: none;
            color: #666;
            font-weight: 400;
            transition: 0.3s;
            cursor: pointer;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--accent-color);
        }

        /* 內容區塊樣 style */
        .container {
            max-width: 800px;
            margin: 100px auto 50px; /* 預留上方給導覽列 */
            padding: 20px;
            background-color: #fff;
            min-height: 60vh;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* 控制區塊顯示隱藏 */
        section {
            display: none; /* 預設全部隱藏 */
            animation: fadeIn 0.5s ease;
        }

        section.active {
            display: block; /* 只有 active 的會顯示 */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { color: var(--primary-color); border-bottom: 2px solid var(--accent-color); padding-bottom: 10px; }
        footer { text-align: center; padding: 30px; color: #999; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="logo">Lab Website</div>
            <div class="nav-links">
                <!-- 這裡的 onclick 會觸發下方的切換函數 -->
                <a onclick="showSection('home')" id="link-home">Home</a>
                <a onclick="showSection('about')" id="link-about">About</a>
                <a onclick="showSection('research')" id="link-research">Research</a>
            </div>
        </nav>
    </header>

    <div class="container">
        <!-- Home 區塊：一打開就會看到的內容 -->
        <section id="home" class="active">
            <h1>Welcome to Our Lab</h1>
            <p>這是我實驗室的簡短介紹。我們專注於<b>微生物發酵</b>與<b>生物技術應用</b>。</p>
            <p>目前的研發重點包含利用特殊菌種（如 <i>Candida rugosa</i>）進行代謝產物開發，並應用於護膚與健康產品中。</p>
        </section>

        <!-- About 區塊 -->
        <section id="about">
            <h1>About Us</h1>
            <p>這裡可以放入實驗室的歷史、成員介紹或更詳細的背景資料。</p>
        </section>

        <!-- Research 區塊 -->
        <section id="research">
            <h1>Research</h1>
            <p>列出您的專利技術、論文發表或目前的實驗項目。</p>
        </section>
    </div>

    <footer>
        &copy; 2024 Laboratory Website | Designed by Your Name
    </footer>

    <script>
        function showSection(sectionId) {
            // 1. 隱藏所有的 section
            const sections = document.querySelectorAll('section');
            sections.forEach(sec => sec.classList.remove('active'));

            // 2. 移除所有導覽連結的 active 樣式
            const links = document.querySelectorAll('.nav-links a');
            links.forEach(link => link.classList.remove('active'));

            // 3. 顯示指定的 section
            document.getElementById(sectionId).classList.add('active');

            // 4. 為點擊的連結加入 active 樣式
            document.getElementById('link-' + sectionId).classList.add('active');

            // 5. 更新網址列（不重整頁面），方便使用者紀錄
            window.location.hash = sectionId;
        }

        // 當網頁一打開時執行
        window.onload = function() {
            // 檢查網址是否有 hash (例如 #about)，沒有的話就預設顯示 home
            const hash = window.location.hash.replace('#', '');
            if (hash && document.getElementById(hash)) {
                showSection(hash);
            } else {
                showSection('home');
            }
        };
    </script>
</body>
</html>
