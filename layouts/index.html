<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Site.Title }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
  
  <style>
    :root { --primary: #2c3e50; --accent: #3498db; }
    body { font-family: 'Noto Sans TC', sans-serif; margin: 0; padding: 0; background: #f9f9f9; color: #333; }
    
    /* 導覽列 */
    header { background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: fixed; width: 100%; top: 0; z-index: 1000; }
    nav { max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; }
    .nav-links a { text-decoration: none; color: #666; margin-left: 20px; transition: 0.3s; }
    .nav-links a:hover { color: var(--accent); }
    
    /* 內容區 */
    .container { max-width: 800px; margin: 100px auto 50px; padding: 30px; background: #fff; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    h1, h2 { color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
    footer { text-align: center; padding: 20px; color: #999; }
  </style>
</head>

<body>
  <header>
    <nav>
      <div style="font-weight:700;">{{ .Site.Title }}</div>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/about/">About</a>
        <a href="/members/">Members</a>
        <a href="/courses/">Courses</a>
        <a href="/photo/">Photo</a>
        <a href="/contact/">Contact</a>
      </div>
    </nav>
  </header>

  <main class="container">
    <!-- 這裡會自動抓取 content/_index.md 的文字內容 -->
    {{ .Content }}
  </main>

  <footer>&copy; {{ now.Format "2006" }} {{ .Site.Title }}</footer>
</body>
</html>
