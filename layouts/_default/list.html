{{ define "main" }}
<div class="list-page">
    <header class="list-header">
        <h1>{{ .Title }}</h1>
    </header>

    <div class="list-content">
        {{ .Content }}
    </div>

    <div class="post-grid">
        {{ range .Pages }}
        <article class="post-item">
            <h2 class="post-title">
                <a href="{{ .Permalink }}">{{ .Title }}</a>
            </h2>
            <div class="post-meta">
                <time>{{ .Date.Format "2006-01-02" }}</time>
            </div>
            {{ if .Summary }}
            <p class="post-summary">{{ .Summary }}</p>
            {{ end }}
        </article>
        {{ end }}
    </div>
</div>
{{ end }}
