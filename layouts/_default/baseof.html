<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {{ if .IsHome }}
            {{ .Site.Title }}
        {{ else }}
            {{ .Title }} | {{ .Site.Title }}
        {{ end }}
    </title>

    <style>

        :root {
            --primary-color: #2c3e50;
            --accent-color: #c00000;
            --border-color: #d9d9d9;
            --bg-color: #f5f5f5;
            --text-color: #333;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Noto Sans TC", sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        /* 左側 sidebar */

        .sidebar {
            width: 360px;
            background: #efefef;
            padding: 50px 30px;
            border-right: 1px solid #ccc;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .sidebar-title {
            font-size: 3rem;
            font-weight: 900;
            color: var(--accent-color);
            letter-spacing: 3px;
            margin-bottom: 50px;
        }

        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sidebar-menu li {
            border-bottom: 2px solid #d0d0d0;
        }

        .sidebar-menu li a {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 26px 8px;
            text-decoration: none;
            color: #444;
            font-size: 1.1rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .sidebar-menu li a:hover {
            color: var(--accent-color);
        }

        .sidebar-menu li.active a {
            color: var(--accent-color);
            border-bottom: 3px solid var(--accent-color);
        }

        /* 右側內容 */

        .main-content {
            flex: 1;
            padding: 70px 80px;
            overflow-x: hidden;
        }

        .page-title {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #444;
        }

        .page-divider {
            border: none;
            border-top: 1px solid #ccc;
            margin-bottom: 60px;
        }

        main {
            background: transparent;
        }

        h1, h2, h3 {
            color: #333;
        }

        img {
            max-width: 100%;
            height: auto;
        }

        p {
            line-height: 1.8;
        }

        /* 手機版 */

        @media (max-width: 900px) {

            .layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding: 30px 20px;
            }

            .sidebar-title {
                font-size: 2rem;
                margin-bottom: 30px;
            }

            .main-content {
                padding: 30px 20px;
            }

            .sidebar-menu li a {
                padding: 18px 5px;
                font-size: 1rem;
            }
        }

    </style>
</head>

<body>

<div class="layout">

    <!-- 左側 -->

    <aside class="sidebar">

        <div class="sidebar-title">
            CATEGORIES
        </div>

        <ul class="sidebar-menu">

            {{ range .Site.Menus.main }}

            <li class="{{ if $.IsMenuCurrent "main" . }}active{{ end }}">
                <a href="{{ .URL }}">
                    {{ .Name }}
                    <span>⌄</span>
                </a>
            </li>

            {{ end }}

        </ul>

    </aside>

    <!-- 右側 -->

    <div class="main-content">

        <div class="page-title">
            {{ .Title }}
        </div>

        <hr class="page-divider">

        <main>
            {{ block "main" . }}{{ end }}
        </main>

    </div>

</div>

</body>
</html>
